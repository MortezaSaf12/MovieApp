name: CI – Build & Test

on:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Run Unit Tests
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        run: |
          # Use the latest Xcode available on the runner.
          # `ls /Applications/` to see available versions if debugging.
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "Movie Recommendation App.xcodeproj" \
            -scheme "Movie Recommendation App"

      - name: Build and test
        run: |
          xcodebuild test \
            -project "Movie Recommendation App.xcodeproj" \
            -scheme "Movie Recommendation App" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -only-testing:"Movie Recommendation AppTests" \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO | xcpretty --color

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 30

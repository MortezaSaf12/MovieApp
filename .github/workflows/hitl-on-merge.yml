name: HITL – Log Acceptance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
    types: [closed]

jobs:
  log-acceptance:
    name: Log Accepted Tests
    if: >
      github.event.pull_request.merged == true
      && contains(toJSON(github.event.pull_request.labels.*.name), 'hitl-generated')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Parse PR title
        id: meta
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          FEATURE=$(echo "$TITLE" | sed -n 's/.*test(hitl): \(.*\) \[iter.*/\1/p')
          ITERATION=$(echo "$TITLE" | sed -n 's/.*\[iter \([0-9]*\)\].*/\1/p')
          echo "feature=$FEATURE" >> $GITHUB_OUTPUT
          echo "iteration=${ITERATION:-1}" >> $GITHUB_OUTPUT

      - name: Log decision
        run: |
          python3 hitl_logger.py log-decision \
            --feature "${{ steps.meta.outputs.feature }}" \
            --iteration ${{ steps.meta.outputs.iteration }} \
            --decision "accept" \
            --pr-number ${{ github.event.pull_request.number }}

      - name: Commit to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "HITL Bot"
          git config user.email "hitl-bot@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git add -f hitl_logs/
          git diff --staged --quiet || git commit -m "log(hitl): accepted ${{ steps.meta.outputs.feature }} iter ${{ steps.meta.outputs.iteration }}"
          git push origin main

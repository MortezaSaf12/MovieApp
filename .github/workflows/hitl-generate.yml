name: HITL – Generate Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      feature_query:
        description: >
          Descriptive query for RAG retrieval. Use natural language, not
          function names. Example: "movie recommendations genre frequency
          scoring filtering watchlist"
        required: true
        type: string
      feature_name:
        description: >
          Short feature name (used for branch name and test file name).
          Example: "fetchRecommendations"
        required: true
        type: string
      output_path:
        description: >
          Path for the generated test file.
          Example: "Movie Recommendation AppTests/Generated_FetchRecommendationsTests.swift"
        required: true
        type: string
      top_k:
        description: "Number of source files to retrieve via RAG (default: 5)"
        required: false
        type: number
        default: 5
      feedback:
        description: >
          Optional: human feedback from a rejected previous attempt.
          Leave empty for first-time generation.
        required: false
        type: string
        default: ""
      iteration:
        description: "Iteration number (1 = first attempt, 2+ = re-generation after feedback)"
        required: false
        type: number
        default: 1

jobs:
  generate-and-pr:
    name: Generate Tests & Open PR
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install anthropic sentence-transformers pinecone

      - name: Generate tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: |
          python3 generate_tests.py \
            --query "${{ github.event.inputs.feature_query }}" \
            --output "${{ github.event.inputs.output_path }}" \
            --feature "${{ github.event.inputs.feature_name }}" \
            --reference "Movie Recommendation AppTests/Movie_Recommendation_AppTests.swift" \
            --top-k ${{ github.event.inputs.top_k }} \
            --iteration ${{ github.event.inputs.iteration }} \
            ${{ github.event.inputs.feedback && format('--feedback "{0}"', github.event.inputs.feedback) || '' }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build and test
        id: test_run
        continue-on-error: true
        run: |
          xcodebuild test \
            -project "Movie Recommendation App.xcodeproj" \
            -scheme "Movie Recommendation App" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -only-testing:"Movie Recommendation AppTests" \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -50
          echo "test_result=$?" >> $GITHUB_OUTPUT

      - name: Create branch and commit generated tests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="hitl/${{ github.event.inputs.feature_name }}-iter${{ github.event.inputs.iteration }}"
          git config user.name "HITL Bot"
          git config user.email "hitl-bot@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git checkout -b "$BRANCH"
          OUTPUT_PATH="${{ github.event.inputs.output_path }}"
          git add "$OUTPUT_PATH"
          git add -f hitl_logs/
          git commit -m "test(hitl): generate tests for ${{ github.event.inputs.feature_name }} [iter ${{ github.event.inputs.iteration }}]"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Sync budget to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/hitl_sync
          cp hitl_logs/budget_tracker.json /tmp/hitl_sync/ 2>/dev/null || true
          cp hitl_logs/interactions.jsonl /tmp/hitl_sync/ 2>/dev/null || true
          git checkout main
          git pull origin main
          mkdir -p hitl_logs
          cp /tmp/hitl_sync/budget_tracker.json hitl_logs/ 2>/dev/null || true
          cp /tmp/hitl_sync/interactions.jsonl hitl_logs/ 2>/dev/null || true
          git config user.name "HITL Bot"
          git config user.email "hitl-bot@users.noreply.github.com"
          git add -f hitl_logs/budget_tracker.json hitl_logs/interactions.jsonl
          git diff --staged --quiet || git commit -m "log(hitl): sync budget after generation"
          git push origin main
          git checkout "$BRANCH"

      - name: Build PR body
        run: |
          python3 - "${{ steps.test_run.outcome }}" \
                    "${{ github.event.inputs.feature_name }}" \
                    "${{ github.event.inputs.feature_query }}" \
                    "${{ github.event.inputs.iteration }}" << 'PYEOF'
          import json, sys, textwrap

          test_outcome, feature, query, iteration = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]

          with open("hitl_logs/last_run_metadata.json") as f:
              m = json.load(f)

          files = "\n".join(f"- `{f}`" for f in m["retrieved_files"])
          test_status = "passed" if test_outcome == "success" else "failed (see build log)"

          body = f"""## Generated Tests — Review Required

          **Feature:** `{feature}`
          **Iteration:** {iteration}
          **Query:** `{query}`
          **Prompt version:** `{m['system_prompt_version']}`
          **Build:** {test_status}

          ### Retrieved source files
          {files}

          ### Cost
          | Metric | Value |
          |--------|-------|
          | Input tokens | {m['input_tokens']} |
          | Output tokens | {m['output_tokens']} |
          | This call | ${m['cost_usd']} |
          | Cumulative | ${m['cumulative_cost_usd']} |
          | Stop reason | {m['stop_reason']} |

          ### Next steps
          - Merge if the tests are correct.
          - Close with a comment describing what to fix, then re-trigger with the feedback field filled in and iteration incremented.
          """

          with open("pr_body.md", "w") as f:
              f.write(textwrap.dedent(body))
          PYEOF

      - name: Open Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "test(hitl): ${{ github.event.inputs.feature_name }} [iter ${{ github.event.inputs.iteration }}]" \
            --body-file pr_body.md \
            --label "hitl-generated"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-iter${{ github.event.inputs.iteration }}
          path: TestResults.xcresult
          retention-days: 30

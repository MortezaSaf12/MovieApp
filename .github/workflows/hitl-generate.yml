name: HITL – Generate Tests

on:
  workflow_dispatch:
    inputs:
      feature_query:
        description: 'RAG query. Example: "movie recommendations genre frequency scoring"'
        required: true
        type: string
      feature_name:
        description: 'Feature name. Example: "fetchRecommendations"'
        required: true
        type: string
      output_path:
        description: 'Output path. Example: "Movie Recommendation AppTests/Generated_FetchRecommendationsTests.swift"'
        required: true
        type: string
      top_k:
        description: "Number of source files to retrieve via RAG (default: 5)"
        required: false
        type: number
        default: 5
      feedback:
        description: "Feedback from a rejected previous attempt (leave empty for first run)"
        required: false
        type: string
        default: ""
      iteration:
        description: "Iteration number (increment after each rejection)"
        required: false
        type: number
        default: 1

jobs:
  generate-and-pr:
    name: Generate Tests & Open PR
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install anthropic sentence-transformers pinecone

      - name: Generate tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: |
          python3 generate_tests.py \
            --query "${{ github.event.inputs.feature_query }}" \
            --output "${{ github.event.inputs.output_path }}" \
            --feature "${{ github.event.inputs.feature_name }}" \
            --reference "Movie Recommendation AppTests/Movie_Recommendation_AppTests.swift" \
            --top-k ${{ github.event.inputs.top_k }} \
            --iteration ${{ github.event.inputs.iteration }} \
            ${{ github.event.inputs.feedback && format('--feedback "{0}"', github.event.inputs.feedback) || '' }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build and test
        id: test_run
        continue-on-error: true
        run: |
          xcodebuild test \
            -project "Movie Recommendation App.xcodeproj" \
            -scheme "Movie Recommendation App" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -only-testing:"Movie Recommendation AppTests" \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -50
          echo "test_result=$?" >> $GITHUB_OUTPUT

      - name: Commit generated tests
        run: |
          BRANCH="hitl/${{ github.event.inputs.feature_name }}-iter${{ github.event.inputs.iteration }}"
          git config user.name "HITL Bot"
          git config user.email "hitl-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "${{ github.event.inputs.output_path }}"
          git add hitl_logs/
          git commit -m "test(hitl): generate tests for ${{ github.event.inputs.feature_name }} [iter ${{ github.event.inputs.iteration }}]"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Build PR body
        id: pr_body
        run: |
          META=$(cat hitl_logs/last_run_metadata.json)
          TOKENS_IN=$(echo "$META" | python3 -c "import sys,json; print(json.load(sys.stdin)['input_tokens'])")
          TOKENS_OUT=$(echo "$META" | python3 -c "import sys,json; print(json.load(sys.stdin)['output_tokens'])")
          COST=$(echo "$META" | python3 -c "import sys,json; print(json.load(sys.stdin)['cost_usd'])")
          CUMULATIVE=$(echo "$META" | python3 -c "import sys,json; print(json.load(sys.stdin)['cumulative_cost_usd'])")
          PROMPT_VER=$(echo "$META" | python3 -c "import sys,json; print(json.load(sys.stdin)['system_prompt_version'])")
          STOP=$(echo "$META" | python3 -c "import sys,json; print(json.load(sys.stdin)['stop_reason'])")
          FILES=$(echo "$META" | python3 -c "import sys,json; print('\n'.join(['- ' + f for f in json.load(sys.stdin)['retrieved_files']]))")
          TEST_STATUS=${{ steps.test_run.outcome == 'success' && '"passed"' || '"failed (see build log)"' }}

          cat > pr_body.md << 'PREOF'
          ## Generated Tests — Review Required

          **Feature:** `${{ github.event.inputs.feature_name }}`
          **Iteration:** ${{ github.event.inputs.iteration }}
          **Query:** `${{ github.event.inputs.feature_query }}`
          **Prompt version:** `PROMPT_VER_PLACEHOLDER`
          **Build:** TEST_STATUS_PLACEHOLDER

          ### Retrieved source files
          FILES_PLACEHOLDER

          ### Cost
          | Metric | Value |
          |--------|-------|
          | Input tokens | TOKENS_IN_PLACEHOLDER |
          | Output tokens | TOKENS_OUT_PLACEHOLDER |
          | This call | $COST_PLACEHOLDER |
          | Cumulative | $CUMULATIVE_PLACEHOLDER |
          | Stop reason | STOP_PLACEHOLDER |

          ### Next steps
          - Merge if the tests are correct.
          - Close with a comment describing what to fix, then re-trigger with the feedback field filled in and iteration incremented.

          PREOF

          sed -i '' "s|PROMPT_VER_PLACEHOLDER|$PROMPT_VER|" pr_body.md
          sed -i '' "s|TEST_STATUS_PLACEHOLDER|$TEST_STATUS|" pr_body.md
          sed -i '' "s|FILES_PLACEHOLDER|$FILES|" pr_body.md
          sed -i '' "s|TOKENS_IN_PLACEHOLDER|$TOKENS_IN|" pr_body.md
          sed -i '' "s|TOKENS_OUT_PLACEHOLDER|$TOKENS_OUT|" pr_body.md
          sed -i '' "s|COST_PLACEHOLDER|$COST|" pr_body.md
          sed -i '' "s|CUMULATIVE_PLACEHOLDER|$CUMULATIVE|" pr_body.md
          sed -i '' "s|STOP_PLACEHOLDER|$STOP|" pr_body.md

      - name: Open Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "test(hitl): ${{ github.event.inputs.feature_name }} [iter ${{ github.event.inputs.iteration }}]" \
            --body-file pr_body.md \
            --label "hitl-generated"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-iter${{ github.event.inputs.iteration }}
          path: TestResults.xcresult
          retention-days: 30
